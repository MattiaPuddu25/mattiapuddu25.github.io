        ];
        let ronde = 0;
        let scontri = []; // Array per memorizzare tutti gli scontri

        let CONCORRENTE1 = '';
        let CONCORRENTE2 = '';
        const valini = nomi.length;

        function iniziaTorneo(nomi) {
            // Mischia i nomi all'inizio del torneo
            nomi = nomi.sort(() => Math.random() - 0.5);
            eseguiRound(nomi);
        }

        function eseguiRound(nomi) {
            if (nomi.length === 1) {
                document.getElementById("round-title").innerText = `Vincitore: ${nomi[0]}`;
                document.getElementById("btn1").style.display = "none";
                document.getElementById("btn2").style.display = "none";
                return;
            }

            // Rimescola i partecipanti ad ogni round, ma solo se siamo ancora oltre i quarti di finale
            if(Math.log(nomi.length)/Math.log(2) % 1 == 0){  

              if(nomi.length>=64){             
                if(nomi.length!=valini)
                  scontri.push(` `);
                scontri.push(`••••••••••••••••••• ${nomi.length} ancora in gara •••••••••••••••••••••••••••••••••••`);
                scontri.push(` `);
                aggiornaScontri();}
                
              if(nomi.length == 32){
                scontri.push(` `);
                 scontri.push(`••••••••••••••••••• SEDICESIMI DI FINALE •••••••••••••••••••••••••••••••••••`);
                scontri.push(` `);
                aggiornaScontri();}
              
              if(nomi.length == 16){
                scontri.push(` `);
                 scontri.push(`••••••••••••••••••• OTTAVI DI FINALE •••••••••••••••••••••••••••••••••••`);
                aggiornaScontri();}
              
              if(nomi.length == 8){

                scontri.push(` `);
                 scontri.push(`••••••••••••••••••• QUARTI DI FINALE •••••••••••••••••••••••••••••••••••`);
                scontri.push(` `);
                aggiornaScontri();}
              if(nomi.length == 4){
                scontri.push(` `);
                 scontri.push(`••••••••••••••••••• SEMIFINALE •••••••••••••••••••••••••••••••••••`);
                scontri.push(` `);
                aggiornaScontri();}
               if(nomi.length == 2){
                scontri.push(` `);
                 scontri.push(`••••••••••••••••••• FINALE •••••••••••••••••••••••••••••••••••`);
                scontri.push(` `);
                aggiornaScontri();}
              



              if(nomi.length>=16){
              nomi = nomi.sort(() => Math.random() - 0.5);}

            }

            ronde++;
            document.getElementById("round-title").innerText = `Round ${ronde}`;
            [CONCORRENTE1, CONCORRENTE2] = nomi.splice(0, 2); // Prendi i primi 2 concorrenti
            document.getElementById("btn1").innerText = CONCORRENTE1;
            document.getElementById("btn2").innerText = CONCORRENTE2;
            
            // Memorizza lo scontro corrente

            document.getElementById("btn1").onclick = () => scegliVincitore(CONCORRENTE1, nomi, scontri);
            document.getElementById("btn2").onclick = () => scegliVincitore(CONCORRENTE2, nomi, scontri);

//            scontri.push(`${CONCORRENTE1} vs ${CONCORRENTE2} -- ${vincitore}`);
  //          aggiornaScontri();
        }

        function scegliVincitore(vincitore, nomi, scontri) {
            nomi.push(vincitore); // Aggiungi il vincitore alla lista dei prossimi concorrenti
            if(vincitore==CONCORRENTE1)
              CONCORRENTE1 = CONCORRENTE1.toUpperCase();
            else
              CONCORRENTE2 = CONCORRENTE2.toUpperCase();

            scontri.push(`${CONCORRENTE1} -vs- ${CONCORRENTE2}`);
            aggiornaScontri();
            eseguiRound(nomi);
        }

        function aggiornaScontri() {
            const scontriList = document.getElementById("scontri-list");
            scontriList.innerHTML = ''; // Pulisce la lista esistente

            scontri.forEach(scontro => {
                const li = document.createElement("li");
                li.textContent = scontro;
                scontriList.appendChild(li);
            });
        }

        if(Math.log(nomi.length)/Math.log(2) % 1 == 0){
            window.onload = () => {
                iniziaTorneo(nomi);
           };
        }
        else{
            alert(`Mancano ${Math.pow(2,Math.ceil(Math.log(nomi.length)/Math.log(2))) - nomi.length} nome/i per arrivare a un bracket effettuabile`)
            //alert(`Mancano ${2^(Math.ceil(Math.log(nomi.length)/Math.log(2)))} e ${Math.log(nomi.length)/Math.log(2)}`)
        }
